<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escolha seu plano — CriaPet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { graphite: "#22252A", ivory: "#F6F4EF", olive: "#6B7A5E", clay: "#B4682E" },
        fontFamily: {
          display: ["Fraunces", "Georgia", "serif"],
          sans: ["Plus Jakarta Sans", "system-ui", "sans-serif"],
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #F6F4EF; color: #22252A; }
  .font-display { font-family: 'Fraunces', Georgia, serif; }
</style>
</head>
<body class="min-h-screen">

<a href="criapet-landing.html" class="fixed top-6 left-6 flex items-center gap-2 text-sm font-medium text-graphite/70 hover:text-graphite">
  ← Voltar ao site
</a>

<main class="min-h-screen px-8 py-16">
  <h1 class="font-display text-4xl text-center mb-4">Escolha seu plano</h1>
  <p class="text-center text-graphite/70 mb-8">Cancele quando quiser. Sem contratos de fidelidade.</p>

  <div class="flex justify-center mb-12 gap-2">
    <button id="btn-monthly" class="px-4 py-2 rounded-full text-sm bg-graphite text-ivory">Mensal</button>
    <button id="btn-yearly" class="px-4 py-2 rounded-full text-sm bg-graphite/10">Anual (2 meses grátis)</button>
  </div>

  <p id="feedback" class="hidden text-center text-sm rounded-lg px-3 py-2 max-w-md mx-auto mb-6"></p>

  <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto" id="plans-grid"></div>
</main>

<script>
const PLANS = [
  { tier: "BASICO", name: "Básico", monthly: 49.9, yearly: 499.0, features: ["Cadastro de até 1 animal","1 usuário","Agenda de saúde","Financeiro simples"] },
  { tier: "PROFISSIONAL", name: "Profissional", monthly: 129.9, yearly: 1299.0, features: ["Cadastro de até 2 animais","3 usuários","Reservas e contratos digitais","Portal do cliente e comunidade"], highlight: true },
  { tier: "PRO", name: "Pro", monthly: 249.9, yearly: 2499.0, features: ["Cadastro ilimitado de animais","Usuários ilimitados","\"Vai dar namoro\" e busca de veterinários","Notificações automáticas por WhatsApp","Relatórios avançados","Módulo Loja (produtos e vendas)"] },
];

let cycle = "MONTHLY";

function render() {
  document.getElementById('plans-grid').innerHTML = PLANS.map(plan => `
    <div class="rounded-2xl p-8 border transition-transform hover:-translate-y-1 ${plan.highlight ? 'border-clay shadow-lg' : 'border-graphite/15'}">
      <h2 class="font-display text-xl mb-1">${plan.name}</h2>
      <p class="text-3xl font-semibold mb-4">
        R$ ${(cycle === "MONTHLY" ? plan.monthly : plan.yearly).toFixed(2)}
        <span class="text-sm font-normal text-graphite/60">/${cycle === "MONTHLY" ? "mês" : "ano"}</span>
      </p>
      <ul class="space-y-2 mb-6 text-sm text-graphite/80">
        ${plan.features.map(f => `<li>• ${f}</li>`).join('')}
      </ul>
      <button data-tier="${plan.tier}" class="choose-btn w-full rounded-full bg-graphite text-ivory py-2 hover:bg-clay transition-colors">
        Escolher plano
      </button>
    </div>
  `).join('');
}
render();

document.getElementById('btn-monthly').addEventListener('click', () => {
  cycle = "MONTHLY";
  document.getElementById('btn-monthly').className = "px-4 py-2 rounded-full text-sm bg-graphite text-ivory";
  document.getElementById('btn-yearly').className = "px-4 py-2 rounded-full text-sm bg-graphite/10";
  render();
});
document.getElementById('btn-yearly').addEventListener('click', () => {
  cycle = "YEARLY";
  document.getElementById('btn-yearly').className = "px-4 py-2 rounded-full text-sm bg-graphite text-ivory";
  document.getElementById('btn-monthly').className = "px-4 py-2 rounded-full text-sm bg-graphite/10";
  render();
});

document.getElementById('plans-grid').addEventListener('click', (e) => {
  const btn = e.target.closest('.choose-btn');
  if (!btn) return;
  const feedback = document.getElementById('feedback');
  feedback.textContent = "Preview visual — a assinatura real depende da integração com o Asaas no backend.";
  feedback.className = "text-center text-sm rounded-lg px-3 py-2 max-w-md mx-auto mb-6 bg-amber-100 text-amber-800 block";
});
</script>
</body>
</html>
